<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Handwritten Sheet OCR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 1rem; color: #111; }
      nav { max-width: 1120px; margin: 0 auto 1rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
      nav a { color:#111; font-weight:600; text-decoration:none; }
      nav form { margin: 0; }
      .link-button { border: 0; background: transparent; color:#111; font: inherit; font-weight:600; padding: 0; cursor:pointer; }
      .card { max-width: 1120px; margin: 0 auto; padding: 1rem; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
      .row { margin: 0.5rem 0; }
      label { display:block; margin-bottom: 0.25rem; font-weight:600; }
      input[type="file"], input[type="number"], input[type="text"], input[type="password"] { width:100%; padding:0.5rem; box-sizing: border-box; }
      button { padding: 0.6rem 1.2rem; border: 0; border-radius: 8px; background:#111; color:#fff; cursor:pointer; }
      .muted { color:#666; font-size: 0.9rem; }
      .success { background:#f6fff6; border:1px solid #b6e1b6; padding:1rem; margin: 0.75rem 0; }
      .error { background:#fff6f6; border:1px solid #e1b6b6; padding:1rem; margin: 0.75rem 0; }
      table { border-collapse: collapse; width:100%; }
      td, th { border:1px solid #eee; padding:0.45rem; text-align:left; }
      .right { text-align:right; }
    </style>
  </head>
  <body>
    <nav>
      <a href="{% url 'home' %}">Home</a>
      <a href="{% url 'ocr:upload' %}">Handwritten Sheet OCR</a>
      <a href="{% url 'admin:index' %}">Admin</a>
      {% if user.is_authenticated %}
        <form action="{% url 'logout' %}" method="post">
          {% csrf_token %}
          <button type="submit" class="link-button">Logout</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">Login</a>
      {% endif %}
    </nav>
    <main class="card">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
