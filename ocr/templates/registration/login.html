{% extends "base.html" %}
{% block content %}
<h2>Login</h2>

{% if form.errors %}
  <div class="error">Your username and password did not match. Please try again.</div>
{% endif %}

<form method="post" action="{% url 'login' %}">
  {% csrf_token %}
  <div class="row">
    {{ form.username.label_tag }} {{ form.username }}
  </div>
  <div class="row">
    {{ form.password.label_tag }} {{ form.password }}
  </div>
  <input type="hidden" name="next" value="{{ next }}">
  <div class="row">
    <button type="submit">Login</button>
  </div>
</form>
{% endblock %}
